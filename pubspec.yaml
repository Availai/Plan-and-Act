name: planandact
description: "A Flutter mobile app for daily planning, progress tracking, and rule-based motivational message selection."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Code Generation (runtime annotations)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Networking
  dio: ^5.7.0

  # Notifications & Time
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Legacy (migration only — will be removed after Drift migration)
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  uuid: ^4.5.3
  flutter_slidable: ^4.0.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
